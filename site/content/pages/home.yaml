id: home
title: gm
hero:
  heading: "gm"
  subheading: "glootius maximus: raise your coding agent's signal-to-noise ratio"
  body: "PLAN, EXECUTE, EMIT, VERIFY, COMPLETE. gm puts a deterministic loop around your agent so every token it spends is signal toward the work, drift, looping, invented tools, and shipped placeholders are noise, and gm removes them one rule at a time. built for token austerity over 14000+ hours of supervised modification. one skill, every harness. the orchestrator lives in rust as plugkit.wasm."
  badges:
    - { label: "glootius maximus" }
    - { label: "signal over noise / token austerity" }
    - { label: "PLAN / EXECUTE / EMIT / VERIFY" }
    - { label: "one skill, every harness" }
    - { label: "plugkit.wasm orchestrator" }
  ctas:
    - { label: "Star on GitHub", href: "https://github.com/AnEntrypoint/gm", primary: true }
    - { label: "Install", href: "https://github.com/AnEntrypoint/gm#install" }
    - { label: "live stats", href: "./stats/" }
    - { label: "rust crates", href: "./crates/" }
    - { label: "skills", href: "./skills/" }
features:
  heading: "the discipline (every rule removes a noise source)"
  items:
    - name: "a state machine the agent has to walk"
      desc: "PLAN, EXECUTE, EMIT, VERIFY, COMPLETE lives in rs-plugkit as native rust. four verbs (transition, mutable-resolve, memorize-fire, phase-status) drive the agent. the harness asks plugkit what phase it's in and what's still unknown. there is no skip button. out-of-order action and premature closure are the loudest noise an agent makes; the gate removes both. a written PRD is your authorization for the agent to stop asking and start doing."
    - name: "one skill, every harness"
      desc: "skills/gm/SKILL.md is the single skill shipped as the gm-skill npm package, installed as /gm. install it into any harness that loads claude-style skill directories: claude code, gemini cli, opencode, codex, kilo, copilot cli, vscode, cursor, zed, jetbrains, antigravity, windsurf. same skill, same orchestration, zero per-platform drift. add behavior once in skills/gm/ and every harness inherits it on the next install."
    - name: "plugkit-only tool surface"
      desc: "the gm skill's allowed-tools is reduced to Skill, Read, Write. Write exists only for spool dispatch. code, git, browser, recall, memorize, codesearch all route through .gm/exec-spool/ and are serviced by plugkit verbs. the harness never reaches around plugkit. an agent inventing a tool that does not exist is pure noise; one surface, audited, removes it. missing capability becomes a new verb, not a skill-side escape hatch."
    - name: "every unknown is resolved by running code"
      desc: "exec:<lang> for proofs, exec:codesearch for whereabouts, exec:recall for what we already learned. \"I think this should work\" is physically blocked at the hook layer. an unverified assertion is noise dressed as signal; the agent runs the check, reads the output, and writes it as evidence."
    - name: "process of elimination, not guessing"
      desc: "gm resolves an unknown the way a clinician runs a differential diagnosis: name the hypothesis (a mutable, a single row in .gm/mutables.yml), run exactly one test against real code, read the real result, and either cross the hypothesis off or confirm it. repeat until nothing is left unknown. the agent never answers from memory or from what the docs say should happen; it answers from what just happened when the code ran."
    - name: "instructions are file writes, not prose the agent has to interpret"
      desc: "instead of a long paragraph the agent has to read and possibly misread, gm expresses every instruction as a small file: a short JSON or text body written into a spool folder (.gm/exec-spool/in/<verb>/<N>.txt). writing an instruction is structurally identical to writing code, so there is no natural-language translation step to lose signal in. the wasm orchestrator picks the file up, acts on it, and writes a matching response file back."
    - name: "real execution replaces silent thinking"
      desc: "instead of the model reasoning silently inside hidden thinking tokens about whether an approach will work, gm has the agent write and run real code immediately to test the idea. the execution itself is the reasoning, made visible and falsifiable in the terminal instead of invisible inside the model. because of this, turn your coding agent's internal thinking or reasoning-effort setting low or off when running gm: the witnessed-execution loop already does that job, and paying for both is redundant."
    - name: "coding standard: nothing fake, nothing decorative"
      desc: "no comments in shipped code, ever. no synthetic or mock unit test files; verification means running the real thing and reading the real output. plain ascii text only, no decorative unicode or emoji. no stub, placeholder, or fake implementation ever ships, a scaffold is only acceptable when it genuinely delegates to real behavior."
    - name: "the live page is the debugger"
      desc: "for anything that runs in a browser, gm exposes application state as window.* globals and reads them directly in the running page instead of restarting the app and guessing. every browser interaction automatically captures console output, page errors, network timing, and performance data with no extra setup. any client-side edit requires a same-turn browser check proving the change actually works before it counts as done."
    - name: "covering family of bounded subsets"
      desc: "when a request exceeds reach, the agent does not pick one piece and call the rest follow-up. it enumerates every witnessable subset of the ask, executes each, and names the residual complement explicitly. partial delivery dressed up as triage is refusal in disguise, and a dropped requirement is the quietest, costliest noise of all."
    - name: "one npm package, no fanout"
      desc: "an earlier generation fanned fifteen downstream plugin repos (gm-cc, gm-gc, gm-oc, gm-kilo, gm-codex, gm-qwen, gm-copilot-cli, gm-hermes, gm-thebird, gm-vscode, gm-cursor, gm-zed, gm-jetbrains, gm-antigravity, gm-windsurf), each with its own bootstrap shim. those repos are archived. the repo root is the published gm-skill package. add a hook once, it shows up everywhere."
    - name: "wasm polymorphism"
      desc: "gm-skill ships a single plugkit.wasm that runs natively on every operating system through node or bun, no platform-specific builds, no per-architecture matrix. the orchestration logic compiles to hundreds of kilobytes; the shipped artifact is ~149MB because it embeds the bge-small embedding model in-wasm, so recall and memorize compute vectors in-process, offline, leaking no text to a remote embedder. a one-time sha-pinned download buys a self-contained, reproducible, network-independent memory system. the wasm host delegates to node for filesystem, subprocess, and fetch."
    - name: "rust-backed runtime"
      desc: "rs-exec is the runner. rs-codeinsight is the AST x-ray. rs-search is the fast file finder. rs-learn is the memory store. rs-plugkit is the wasm module that ties them together. every push to any of them auto-cascades to a fresh gm-skill on npm within minutes."
    - name: "one spool folder, every dispatch"
      desc: "every verb writes a file to .gm/exec-spool/in/<verb>/<N>.<ext>. the wasm watcher reads the request, services it, and writes the response to out/<verb>-<N>.json. tool args are ephemeral; a file on disk is auditable, replayable, and survives compaction."
    - name: "the mutables file refuses to forget"
      desc: ".gm/mutables.yml lives alongside the PRD. every unknown is a row; status flips to witnessed only when the row carries concrete proof. writes, commits, pushes, and the stop hook are hard-blocked while any row says unknown. an assumption propagated unwitnessed is noise that cascades; the file holds it open until proof arrives. the discipline lives on disk, not in the agent's context window."
    - name: "disciplines keep memory honest"
      desc: "a @discipline sigil scopes recall, codesearch, and memorize to one knowledge store. read broadly, write narrowly: without a sigil, reads fan across enabled disciplines but writes go to default only. cross-project memory bleed produces hallucinated weak_priors, recall noise that poisons every future turn. disciplines stop that at the boundary."
    - name: "AGENTS.md is the staging ground for what the agent learns"
      desc: "a new rule first gets written into AGENTS.md: durable, human-readable, and it survives context compaction. the same rule is then also fired into the vector memory store (memorize-fire) so a future turn can recall it just by working on something related, without anyone having to remember to reread the file. the flow runs both ways: memory also periodically drains back into AGENTS.md as compressed one-line pointers, so the file gains facts without bloating."
    - name: "memory that dedups, decays, and shows up uninvited"
      desc: "learning a fact twice does not create two memories: identical content hashes to the same key, so re-learning something is a no-op. stale or wrong memories get pruned the moment they are noticed. search results are ranked by a mix of semantic similarity and recency, so an older memory fades unless something reinforces it again. and a relevant pack of memories auto-attaches at the start of each turn, the agent never has to remember to ask for its own memory."
    - name: "search by meaning, not by keyword, and answers come back whole"
      desc: "memory recall does not keep a searchable index of raw text anywhere; it stores only vector embeddings, so a query matches by meaning, not by matching words. code search adds one more signal on top of the usual text match: it can rank results by which git commits touched them most relevantly or most recently, not just static grep. both search verbs hand back the full matched content, never a truncated snippet, so the agent is not forced to go fetch the rest. and every verb response is deliberately short and token-optimized, so none of that context gets spent for nothing."
quickstart:
  heading: install
  lines:
    - { kind: "cmt", text: "# install the one skill (/gm) -- copies the dir into ~/.claude/skills/gm, no skills library" }
    - { kind: "cmd", text: "npx gm-skill install" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# non-interactive (sets the claude code settings below outright, prints how to revert):" }
    - { kind: "cmd", text: "npx gm-skill install --yes" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# the installer seeds this line into ~/.claude/CLAUDE.md for you:" }
    - { kind: "cmt", text: "# always use the gm skill for everything, always fan out subagents" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# claude code settings it offers (interactive) or sets (--yes):" }
    - { kind: "cmt", text: '#   autoCompactEnabled: true' }
    - { kind: "cmt", text: '#   autoCompactWindow: 380000   (absolute token count, 38% of a 1M window, not a percent)' }
    - { kind: "cmt", text: '#   effortLevel: "low"' }
    - { kind: "cmt", text: '#   alwaysThinkingEnabled: false' }
    - { kind: "cmt", text: "# the model still reasons -- gm replaces hidden thinking tokens with reasoning in code:" }
    - { kind: "cmt", text: "# form a hypothesis, run it as code or a browser probe, read the real result." }
    - { kind: "cmt", text: "# thinking becomes witnessed execution, not an unverified internal monologue." }
examples:
  heading: read further
  items:
    - { name: "the complete discipline", desc: "lifecycle control, governance, and operational hard rules, every section read as one more way to lift signal over noise. one paper, every rule the agent runs under.", cta: "open paper", href: "./paper/" }
    - { name: "every rust crate", desc: "rs-exec, rs-codeinsight, rs-search, rs-learn, rs-plugkit. what each does, why it exists, what it kills if it misbehaves.", cta: "open crates", href: "./crates/" }
    - { name: "the one skill", desc: "gm is the single shipped skill, a 12-line entry point that names the agent as the state machine. each turn you dispatch the instruction verb to read the active phase, the pending mutables, and the guardrails. plugkit is the durable memory and gate you drive, not an autonomous worker.", cta: "open skills", href: "./skills/" }
    - { name: "distribution", desc: "the cascade pipeline that puts a fresh gm-skill on npm every time anyone touches a rust crate.", cta: "open distribution", href: "./distribution/" }
