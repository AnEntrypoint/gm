name: Verify Clone Size

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Regular clone (default)
        run: |
          git clone "https://github.com/AnEntrypoint/gm.git" repo
          du -sh repo
          du -sh repo/.git

      - name: Top blobs in regular clone
        working-directory: repo
        run: |
          git rev-list --objects --all \
            | git cat-file --batch-check='%(objecttype) %(objectsize) %(objectname) %(rest)' \
            | awk '$1=="blob" {print $2, $3, $4}' \
            | sort -nr | head -20 \
            | awk '{ printf "%10.2f MiB  %s\n", $1/1024/1024, $3 }'

      - name: Pack stats
        working-directory: repo
        run: git count-objects -vH
