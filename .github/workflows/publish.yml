name: Publish

on:
  push:
    branches: [main]
    paths-ignore: ['README.md', 'AGENTS.md', 'CLAUDE.md', 'SKILLS.md', 'docs/**', 'site/**', 'LICENSE', '.gitignore', 'CHANGELOG.md', '.gm/**']
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISHER_TOKEN }}
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check prose bundle completeness + prose-conformance
        run: node scripts/check-prose-bundle.mjs

      - name: Auto-bump version
        run: |
          CURRENT_VERSION=$(jq -r '.version' gm.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "Bumping version from $CURRENT_VERSION to $NEW_VERSION"
          jq --arg v "$NEW_VERSION" '.version = $v' gm.json > /tmp/gm.json.tmp
          mv /tmp/gm.json.tmp gm.json

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > /tmp/pkg.json.tmp
          mv /tmp/pkg.json.tmp package.json

          jq --arg v "$NEW_VERSION" '.version = $v' gm-plugkit/package.json > /tmp/pkg.json.tmp
          mv /tmp/pkg.json.tmp gm-plugkit/package.json

          git config --global user.email "noreply@github.com"
          git config --global user.name "gm-bot"
          git add gm.json package.json gm-plugkit/package.json
          git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Version bumped and pushed (attempt $i)"
              break
            fi
            echo "Push attempt $i failed; rebasing"
            git pull --rebase origin main || true
            if [ "$i" -eq 5 ]; then
              echo "All push attempts exhausted" >&2
              exit 1
            fi
          done

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' gm.json)" >> $GITHUB_OUTPUT

      - name: Verify version-cascade files agree
        run: |
          set -e
          # Two independent version families across 6 files: the gm-skill/
          # gm-plugkit package version (gm.json, package.json, gm-plugkit/
          # package.json -- kept in lockstep by the auto-bump step above) and
          # the separately-cascaded plugkit WASM version (gm.json's
          # plugkitVersion, gm-plugkit/plugkit.version, bin/plugkit.version --
          # written by rs-plugkit's cross-repo push, not this workflow). Each
          # family must agree internally; the two families are NOT expected
          # to match each other. A partial-failure scenario (a cross-repo
          # push racing this workflow's own auto-bump, or a push retry
          # exhausting its 5 attempts and continuing anyway) previously had
          # no check that would ever catch drift -- it just shipped silently
          # until someone noticed mismatched version numbers in the wild.
          PKG_VERSION=$(jq -r '.version' gm.json)
          PKG_VERSION_2=$(jq -r '.version' package.json)
          PKG_VERSION_3=$(jq -r '.version' gm-plugkit/package.json)
          if [ "$PKG_VERSION" != "$PKG_VERSION_2" ] || [ "$PKG_VERSION" != "$PKG_VERSION_3" ]; then
            echo "::error::package version drift: gm.json=$PKG_VERSION package.json=$PKG_VERSION_2 gm-plugkit/package.json=$PKG_VERSION_3"
            exit 1
          fi

          WASM_VERSION=$(jq -r '.plugkitVersion' gm.json)
          WASM_VERSION_2=$(tr -d '[:space:]' < gm-plugkit/plugkit.version 2>/dev/null || echo "MISSING")
          WASM_VERSION_3=$(tr -d '[:space:]' < bin/plugkit.version 2>/dev/null || echo "MISSING")
          if [ "$WASM_VERSION" != "$WASM_VERSION_2" ] || [ "$WASM_VERSION" != "$WASM_VERSION_3" ]; then
            echo "::error::plugkit WASM version drift: gm.json.plugkitVersion=$WASM_VERSION gm-plugkit/plugkit.version=$WASM_VERSION_2 bin/plugkit.version=$WASM_VERSION_3"
            exit 1
          fi

          echo "[ok] package version $PKG_VERSION agrees across 3 files; plugkit WASM version $WASM_VERSION agrees across 3 files"

  publish-gm-skill:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish gm-skill to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          npm publish . --access public 2>&1 | tee /tmp/npm-out.log; EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" != "0" ]; then
            if grep -q "cannot publish over\|previously published" /tmp/npm-out.log; then
              echo "[warn] Version already published, skipping"
            else
              exit "$EXIT"
            fi
          fi
          echo "[done] Published gm-skill@${{ needs.prepare.outputs.version }} to npm"

  publish-gm-plugkit:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish gm-plugkit to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          PLUGKIT_VER=$(jq -r '.plugkitVersion // empty' gm.json)
          if [ -z "$PLUGKIT_VER" ]; then
            echo "::error::gm.json missing plugkitVersion"
            exit 1
          fi
          # Embed every bundled skill's SKILL.md into gm-plugkit so ensureSkillMdFresh
          # finds each one without depending on gm-skill being a sibling. Derived by
          # convention from skills/ -- adding a new skill directory needs no edit here.
          cp skills/gm/SKILL.md gm-plugkit/SKILL.md
          for d in skills/*/; do
            name=$(basename "$d")
            if [ "$name" != "gm" ] && [ -f "${d}SKILL.md" ]; then
              cp "${d}SKILL.md" "gm-plugkit/SKILL-${name}.md"
              echo "[done] Embedded skills/${name}/SKILL.md into gm-plugkit/SKILL-${name}.md"
            fi
          done
          cd gm-plugkit
          echo "$PLUGKIT_VER" > plugkit.version
          npm publish . --access public 2>&1 | tee /tmp/npm-out.log; EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" != "0" ]; then
            if grep -q "cannot publish over\|previously published" /tmp/npm-out.log; then
              echo "[warn] Version already published, skipping"
            else
              exit "$EXIT"
            fi
          fi
          echo "[done] Published gm-plugkit@${{ needs.prepare.outputs.version }} (plugkit v$PLUGKIT_VER) to npm"

      - name: Commit gm-plugkit/plugkit.version back so the committed copy never drifts
        run: |
          set -e
          if [ -n "$(git status --porcelain gm-plugkit/plugkit.version)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add gm-plugkit/plugkit.version
            git commit -m "chore: sync gm-plugkit/plugkit.version to $PLUGKIT_VER [skip ci]"
            git push origin HEAD:main
            echo "[done] committed gm-plugkit/plugkit.version=$PLUGKIT_VER back to main"
          else
            echo "[skip] gm-plugkit/plugkit.version already aligned"
          fi

  mirror-gm-skill-repo:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Git
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "gm-bot"
          git config --global url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Mirror SKILL.md to gm-skill repo (back-compat)
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          set -e
          REPO="AnEntrypoint/gm-skill"
          WORK_DIR="/tmp/gm-skill-mirror"

          gh repo create "${REPO}" --public 2>/dev/null || true

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          git init -q --initial-branch=main
          git remote add origin "https://github.com/${REPO}.git"

          mkdir -p skills/gm-skill
          cp "${GITHUB_WORKSPACE}/skills/gm/SKILL.md" skills/gm-skill/SKILL.md
          if [ -f "${GITHUB_WORKSPACE}/skills/gm/index.js" ]; then
            cp "${GITHUB_WORKSPACE}/skills/gm/index.js" skills/gm-skill/index.js
          fi

          cat > README.md <<'EOF'
          # gm-skill (back-compat mirror)

          This repo mirrors only `skills/gm-skill/SKILL.md` for backward compatibility with
          `bun x skills add AnEntrypoint/gm-skill`. The canonical, maintained source is at
          [AnEntrypoint/gm](https://github.com/AnEntrypoint/gm).

          New installs should prefer:

          ```bash
          bun x skills add AnEntrypoint/gm
          ```
          EOF

          git add -A
          git commit -q -m "Mirror SKILL.md from AnEntrypoint/gm (v${{ needs.prepare.outputs.version }})"
          git push --force origin main
          echo "[done] Mirrored skill to ${REPO}"
