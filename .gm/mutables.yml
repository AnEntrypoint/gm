- id: codeinsight-stale-no-rebuild-on-change
  status: witnessed
  description: 'PRIMARY DEFECT. codesearch verb (wasm_dispatch.rs:501-540) rebuilds ONLY when rebuild:true is explicitly passed (505) OR the file-vec index is completely EMPTY (532). It NEVER rebuilds when the index is non-empty-but-stale (tree changed since last index). Combined with code_index.rs::index() storing no digest (mtime-sum/git-HEAD/dirty-marker), a 6-day-old index built for a different tree is served indefinitely. Repro: codesearch returned ci-1779728* (2026-05-25) rows pointing at gm ./lib ./bin paths. Sync-before-emit (paper §27, mem-1779894406462) requires a freshness check before emit; the verb has none for the non-empty case. Witness: wasm_dispatch.rs:505,532 only-empty/only-explicit rebuild gates; code_index.rs no digest grep-match.'
  witness_evidence: 'CONFIRMED, PRIMARY ROOT CAUSE. wasm_dispatch.rs::codesearch rebuilds ONLY on explicit rebuild:true (line 505) or completely-empty index (line 532). Lines 519-522: if host_vec_search returns non-empty hits, it returns them immediately with NO staleness check. A non-empty-but-stale index (tree changed) is served forever. Repro returned ci-1779728* (2026-05-25, 6 days old) gm-tree rows. Fix tracked in PRD fix-codeinsight-digest-resync (the resync gate closes this).'
