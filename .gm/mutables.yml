  witness_evidence: 'plugkit-wasm-wrapper.js startManagedBrowser launch args (1031-1039) include --remote-debugging-port but NOT --no-startup-window and no initial URL. Non-headless chromium with --remote-debugging-port opens a DEFAULT startup window (about:blank/new-tab) on launch. Then runBrowserRunner(pw, [session,new,--direct,wsEndpoint]) connects via CDP; if playwriter does Target.createTarget (new page/window) instead of attaching to the existing default page, the original chromium startup window is left unused = the extra window the user sees pop up to get started. HYPOTHESIS: add --no-startup-window so chromium exposes CDP without opening a default window, letting playwriter session new create the single used page; OR have playwriter reuse the existing initial target. Need live witness: count CDP targets/pages after a fresh session new to confirm whether playwriter reuses or creates a new one.'
