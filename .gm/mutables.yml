- id: hero-collapse-root-cause
  claim: 'The h1 box collapses to ~13px while glyphs paint at ~81px (Range rect w92 h81), immune to height:auto!important / line-height / display / overflow / padding on the live page. No CSS rule and no SDK JS sets the height (h1 has empty style=, .app-main is flex-direction:column, no ResizeObserver/height-locker). Collapse correlates with the loaded Space Grotesk webfont metrics. Needs a local flatspace+SDK build+browser iterate loop to fix (candidate fixes: @font-face ascent-override/size-adjust to repair line metrics, or wrapping the hero heading so its box is computed from line-height). Reachable with the build toolchain; not fixable via remote live-injection.'
  status: witnessed
  witness_evidence: 'RESOLVED: cause is .app-main > *{min-height:0} (app-shell.css:293) on a height:100% flex column -> default flex-shrink:1 compresses children below content. Fix .app-main > *{flex-shrink:0}. Verified live-injection browser-763 h1 13->76px overlap gone, and built site browser-781/801. Not a font-metric bug; the font correlation was incidental (fallback vs loaded changed content height enough to mask/expose the shrink).'
