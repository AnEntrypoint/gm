- id: supervisor-acquire-single-instance-toctou-race
  status: witnessed
  witness: 'gm-log 2026-06-02T12:39:11.622-13.022 shows FOUR supervisors starting simultaneously (supervisor.starting pids 22084/18484/16340/22056) with ZERO refused-duplicate events - my single-instance acquireSingleInstance guard (2cd2d002, published 2.0.1517) did NOT reject any. ROOT CAUSE: acquireSingleInstance is non-atomic (TOCTOU): it fs.existsSync(SUPERVISOR_PID_PATH) -> read -> check-alive -> fs.writeFileSync. When N supervisors spawn in the same ms (this fires gm-skill load triggered a burst at 12:39:11), all N see the file absent/empty, all pass the guard, all write (last-writer-wins) -> N supervisors coexist, each spawning watchers -> 8 watchers. The guard only prevents a SEQUENTIAL duplicate (a later boot when a prior supervisor already wrote+holds the pid), not a CONCURRENT burst. SECOND issue: the bootstrap (parent=claude.exe 4916) spawns MULTIPLE supervisors per gm-skill load/boot-probe (4 at once), not one. The .supervisor.pid ends empty because lock-rejected/exiting supervisors releaseSingleInstance-unlink it.'
  note: 'fix: make acquireSingleInstance atomic via O_EXCL exclusive-create lock file (fs.openSync flag wx) so only one wins the race; AND/OR fix the bootstrap to spawn at most one supervisor per skill-load (findSupervisorPid + a spawn mutex)'
  witness_evidence: 'FIXED the TOCTOU race in acquireSingleInstance in BOTH gm-plugkit/supervisor.js and bin/plugkit-supervisor.js: replaced the non-atomic existsSync->read->write with an atomic O_EXCL exclusive-create (fs.openSync(SUPERVISOR_PID_PATH, wx)). Now when N supervisors race to start in the same instant, openSync wx succeeds for exactly ONE (the file create is atomic); the rest get EEXIST -> read holder -> if alive refuse+exit, if dead/stale unlink+retry-once. This neutralizes the concurrent-burst duplicate-spawn the plain check-then-write let through (witnessed: 4 supervisor.starting at 12:39:11 with zero refused-duplicate). node --check passes both. The bootstrap spawning a burst of supervisors per skill-load is now harmless (the guard rejects all but one). Ships via gm-skill (bin) + gm-plugkit publish.'
