- id: skill-md-leads-with-instruction-dispatch
  claim: SKILL.md opening enforces start-of-turn instruction dispatch + Fix-on-Sight + residual-scan-before-stop as prose principles
  witness_method: read SKILL.md, verify opening paragraph before 'Boot the spool watcher' contains all three principles
  witness_evidence: 'SKILL.md lines 9-15: opening reads ''Every turn begins with instruction. Write .gm/exec-spool/in/instruction/<N>.txt (empty body) and read the response...'' followed by ''Direct Read/Edit/Bash before the first instruction dispatch is the failure mode this skill prevents...'' followed by ''Fix on Sight. Every unexpected output ... becomes a PRD item the same turn...'' followed by ''Before any apparent stop, dispatch residual-scan...''. All three principles present as imperative prose, no numbered procedure.'
  status: witnessed
