- id: skill-md-forbids-unsolicited-docs
  claim: gm-starter/skills/gm-skill/SKILL.md opening contains a terse principle forbidding unsolicited *.md/*.txt creation and naming PRD/memorize-fire/commit message as the sanctioned destinations
  witness_method: read updated SKILL.md, verify paragraph adjacent to Fix-on-Sight/Browser-Witness
  witness_evidence: 'SKILL.md now contains: ''Do not create documentation files the user did not ask for. No COMPLETED.md, no SUMMARY.txt, no IMPLEMENTATION_NOTES.md, no START-HERE.md, no *-STATUS.md, no build-output.txt left behind, no new top-level .md or .txt of any kind. Closure narrative lives in the PRD (which plugkit owns), in memorize-fire (which becomes recallable next session), and in the commit message (which git log preserves) — those are the only sanctioned destinations. A new doc at project root, in docs/, or anywhere else is a residual the next stop-gate will flag.'' Placed adjacent to Browser Witness imperative.'
  status: witnessed
- id: rs-plugkit-instructions-forbid-unsolicited-docs
  claim: plan.rs, execute.rs, emit.rs, verify.rs all carry the no-unsolicited-docs rule in their imperative prose
  witness_method: read each modified file, verify the rule is present
  witness_evidence: 'plan.rs: added ''No Unsolicited Docs'' section after ''PRD Mandatory'' — rejects PRD items proposing to write *.md/*.txt the user did not request. execute.rs: added ''No Unsolicited Docs'' section after ''Nothing Fake'' — frames closing-by-writing-a-doc as documentation analog of always-succeeds code. emit.rs: extended ''Write'' section — artifacts emitted are the ones the PRD names, .md or .txt not in PRD does not get written, closing narrative goes to commit message + memorize-fire. verify.rs: added ''Unsolicited-Doc Residual'' section before ''Residual-Scan Gate'' — delete-or-fold disposition, names SUMMARY.md/COMPLETED.md/etc as canonical examples that do not survive into the commit.'
  status: witnessed
