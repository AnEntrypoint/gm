- id: shared-db-inmemory-root-cause
  description: 'why project_db_path hardcodes :memory: -- is it fixable at the rs-plugkit level'
  status: witnessed
  witness: 'gm-plugkit/plugkit-wasm-wrapper.js WASI shim (C:/Users/user/.gm-tools/plugkit-wasm-wrapper.js:1640-1641): path_open and path_filestat_get unconditionally return 8 (WASI EBADF) -- there is no real filesystem behind this WASI shim at all, only fd_write (stdout/stderr passthrough), fd_read (always returns 0 bytes), clock/random. project_db_path''s '':memory:'' hardcode is NOT a bug in rs-plugkit -- it is the only path libsql-ffi can actually open given this shim''s current capability. Making rslearn_kv/rssearch_vectors/code_chunks durable across restarts requires implementing a real WASI filesystem shim (path_open backed by Node fs.openSync, fd_read/fd_write backed by real reads/writes, fd_filestat_get backed by fs.fstatSync) in gm-plugkit''s JS wrapper -- this is JS-host work, not rs-plugkit Rust, and is a materially larger/riskier change than a one-line path fix since it touches the sandbox boundary the WASI shim exists to enforce.'
