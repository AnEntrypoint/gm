  failure_mode: Three agents check stale holder simultaneously -> all pass age/alive check -> all unlink and create lock -> race condition -> mutable state loss
  edge_case: holder process dies between pidcheck and unlock; holder becomes zombie; multiple bootstrap calls in parallel
  status: witnessed
  witness_evidence: 'Read gm-plugkit/plugkit-wasm-wrapper.js:2613-2703 watcher lock acquisition: fs.openSync(LOCK_PATH,''wx'') is the atomic primitive (O_EXCL per AGENTS.md atomic-guard rule) -- the actual lock-creation is atomic. checkExistingHolder+unlink+reopen (2680-2683) is the STALE-lock-reclaim path only, reached when ''wx'' already failed (lock exists); the reclaim reopens with the SAME ''wx'' atomic flag, so if two agents race to reclaim, only one open succeeds and the other gets EEXIST again, looping back to checkExistingHolder -- not a silent double-acquire. The TOCTOU window is bounded to ''re-detect and retry'', not ''both proceed as if holding the lock''. No code gap found; the atomic ''wx'' reopen after unlink already prevents the described double-lock outcome.'
