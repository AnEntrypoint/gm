  description: 'rs-plugkit/src/code_index.rs has no digest/mtime/git-HEAD/dirty-marker stored or compared; search() (line 410) and the codesearch verb never trigger a freshness check before serving, violating sync-before-emit. Witness: grep digest|stale|sync|mtime|HEAD over code_index.rs returns zero matches; repro codesearch returned ci-1779728* rows from 2026-05-25.'
  witness_evidence: CONFIRMED. code_index.rs (517 lines) contains zero digest/mtime/git-HEAD/dirty-marker storage or comparison (grep digest|stale|sync|mtime|HEAD = no matches in index/search logic). search() at code_index.rs:410 and codesearch verb at wasm_dispatch.rs:501 serve existing rows with no freshness check. This is the sync-before-emit violation. Fix tracked in PRD fix-codeinsight-digest-resync.
- id: codeinsight-index-no-clear-appends-stale
  status: witnessed
  description: 'code_index.rs::index() (line 324) re-indexes by APPENDING fv_put(''codeinsight''/''codeinsight-vec'', key=ci-<now_ms>-...) without clearing prior rows for the same files (only clear_codeinsight_if_dim_mismatch on dim change). Every re-index piles new chunks beside old ones; stale + duplicate chunks accumulate unboundedly = both staleness and noise. Witness: code_index.rs:387-391 unconditional fv_put with now_ms key; clear_codeinsight only called on dim mismatch (line 330).'
  witness_evidence: 'PARTIALLY CONFIRMED, REFRAMED. code_index.rs:387-391 does append fv_put with ci-<now_ms> keys without clearing prior file rows (only clear on dim mismatch, line 330) - so disk grows unbounded (real, PRD fix-codeinsight-index-clear-before-rebuild). BUT the query-time noise from duplicates is already mitigated: host_vec_search dedups identical text via jaccardOverlap>=0.7 at plugkit-wasm-wrapper.js:1746. So appended dupes do NOT pollute results, only disk. The real query noise is weak-cosine hits, reframed into mutable codeinsight-no-cosine-floor-no-dedup. Documented in PRD resolve-codeinsight-dedup-already-present.'
