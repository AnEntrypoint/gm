- id: longgap-reset-on-any-dispatch
  subject: 'FIX the dominant deviation (long-gap-no-instruction x29, almost all verb=browser gap 300k-635k): rs-plugkit src/gates.rs:241-286 resets the long-gap clock ONLY on orchestrator verbs (instruction/transition/prd-*/mutable-*), never on work verbs (browser/exec_js/codesearch/recall/fetch/memorize/git_*). A rapid succession of active browser dispatches with no interleaved instruction trips the 300s gate even though the agent is NOT idle - it is actively working. This hit the live agent repeatedly during browser-debugging this session. FIX: track a separate last-ANY-dispatch timestamp (.gm/last-dispatch-ts written on every verb) and only fire long-gap-no-instruction when BOTH >300s since last instruction AND >300s genuinely idle since the last dispatch of any verb. Active work (any verb within 300s) keeps the chain alive without forcing a re-orient. The drift the gate guards against is IDLE-mid-chain, not active-work-without-re-reading-prose. Witness: a browser-heavy sequence no longer trips the gate; a true 300s idle still does.'
