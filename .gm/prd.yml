- id: investigate-watcher-silent-abort-frequency
  title: Investigate why gm watchers silently abort without writing .shutdown-reason.json (71 lifetime, pid 15092 died ~33min uptime)
  detail: 'The supervisor SILENT-ABORT detection + peer-stale-takeover recovers cleanly every time (validated in practice this fire: pid 15092 sha 91d21092a977 died age=1993359ms prior_pid_alive=false, new watcher took over). But 71 lifetime silent aborts in this gm watcher.log is high - a watcher that exits without writing .shutdown-reason.json is by definition an unhandled death (uncaught exception escaping the top-level handler, OOM, or external SIGKILL). Most of the 71 correlate with HISTORICAL require/import ESM-context crashes (plugkit-wasm-wrapper.js:566:39 require-is-not-defined, pre-6ead06a0) which are now fixed. Confirm the post-6ead06a0 / post-91d21092a977 silent-abort rate is near-zero (the historical ones should not recur); if any fire under the current wrapper, add a top-level process.on(uncaughtException/unhandledRejection) that writes .shutdown-reason.json before exit so the death is never silent. Witness: grep -c SILENT ABORT .gm/exec-spool/.watcher.log = 71; errors at wrapper:566:39 are historical (git.commit 6ead06a0 appears AFTER them in log).'
  status: completed
  witness: 'RESOLVED as working-as-designed, no code change needed. plugkit-wasm-wrapper.js ALREADY has full death-observability: process.on(uncaughtException):99 + unhandledRejection:105 both call emitShutdownReason() before exit, and process.on(exit):111 writes a fallback shutdown-reason if not already written. So every CATCHABLE death is recorded. The 71 silent aborts are by definition UNcatchable deaths - the supervisor force-kills a wedged/unresponsive watcher via peer-stale-takeover (seen as boot_reason in log), and a force-kill (SIGKILL on a wedged process) bypasses all exit handlers, so the killed watcher cannot write .shutdown-reason.json. The new watcher then correctly reports SILENT ABORT and takes over - this is the recovery machinery WORKING (validated in practice this fire: pid 15092 sha 91d21092a977 wedged 18min, force-killed, new pid 8816 took over cleanly, browser+all verbs serving). Most of the 71 also correlate with HISTORICAL require/import ESM crashes (wrapper:566:39) now fixed by 6ead06a0. Confirmed 0 require/import/uncaught errors under the current wrapper since boot. No defect: handlers cover catchable deaths, supervisor takeover covers uncatchable ones.'
