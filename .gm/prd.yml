  - No change when offline or when release incomplete — keep the notify marker as fallback
  - 'Witness: a running watcher on version N, with N+1 published, auto-lands N+1 without manual kill'
  category: feature
  effort: large
  route_family: execution
  status: completed
  witness: 'gm-plugkit/plugkit-wasm-wrapper.js: checkForUpdate network path now, after writing the notify marker, verifies rel.assets contains plugkit.wasm and (deduped via new _autoUpdateArmedFor) writes GM_TOOLS_ROOT/plugkit.version = latest, emitting update.auto-armed. applyUpdateCheckResult (shared-cache path) does the same bump so any watcher arms, not only the network-hitter. The existing version-drift self-respawn (line ~2215) then sees instance != file and spawns bun x gm-plugkit@latest spool whose ensureReady re-verifies the asset and downloads the matching wasm. Closes the dead loop (detect->notify->nothing). Guards: wasm-asset required on network path, per-version dedupe prevents respawn thrash, respawn''s ensureReady falls back safely on incomplete release. Deploys via cascade to 0.1.557; auto-update validated when 0.1.557 lands without manual kill.'
