- id: reframe-L1-cost-not-effort-ceiling
  title: 'entry.rs:15 L1 currently reads amortized cost <= prior-best envelope / unmeasured marginal = not admitted - an EFFICIENCY CEILING that an agent can read as do the cheaper thing. Reframe: L1 admits on WITNESS/measurement of a mutation candidate (an unmeasured speedup claim is the only thing it rejects), and the EFFORT/work envelope is explicitly UNBOUNDED - maximal-effort, fully-destructive, no amount of work too much. Cost here = the correctness-cost of an unverified claim, NEVER the effort-cost of doing more.'
  status: completed
  witness: 'entry.rs:15 rewritten: L1 admits on witness not cheapness; rejects unmeasured optimization CLAIM, admits correct witnessed mutation however expensive; cost L1 weighs = correctness-cost of unverified claim never effort-cost; work envelope unbounded, maximal-effort fully-destructive. Committed a0fbd8b.'
- id: reframe-L2-bounds-floor-not-ceiling
  title: 'entry.rs:16 L2 hard cap per resource + backpressure reads as a coverage ceiling. Keep the LOAD-BEARING single-writer |F|=1 (unreconcilable-state prevention) but reframe bounds: the only bound is concurrent-writers-per-surface (safety); the COVERAGE/effort bound is a FLOOR you expand past, never a ceiling. Expand the bounds = expand the cover maximally. The hard-cap is about not corrupting a surface, not about doing less work.'
  status: completed
  witness: 'entry.rs:16 rewritten: kept single-writer |F|=1 (unreconcilable-state prevention) + backpressure; reframed as crash-safety floor on concurrent writers, never a coverage ceiling; expand-the-bounds is the move not stay-under. a0fbd8b.'
