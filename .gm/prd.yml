  body: 'AUDIT FINDING (30m window, ccsniff search-discipline: 8 gm violations all from this session 9b662c15): the code-symbol greps that triggered them (host_browser_exec, getOrCreateBrowserSession, fn host_read, session routing) were all against rs-plugkit - a SIBLING repo. codesearch''s index (lib/daemon-bootstrap.js computeIndexDigest walks ONLY cwd; codesearch-2 hits are all ./gm-plugkit ./lib gm files) does NOT cover sibling repos, so the agent working a sibling repo has NO codesearch path and is forced to bash-grep, which ccsniff flags as a deviation. This is a real tooling gap, not pure indiscipline. DECIDE+IMPLEMENT one: (A) codesearch verb accepts an optional {root|cwd} to index+search a sibling repo path (rs-plugkit/rs-exec/etc), so cross-repo code lookup routes through the verb; OR (B) ccsniff --search-discipline exempts bash-grep whose path target is a known sibling repo outside cwd (since no codesearch index exists for it), so the detector stops false-flagging unavoidable cross-repo search. Prefer (A) if cheap (real capability), else (B) (stop false positives). Witness: either codesearch {root:''C:/dev/rs-plugkit'', query} returns hits, or ccsniff no longer flags a sibling-path grep.'
  status: completed
  witness: 'Chose option B (pliable/net-smaller: ccsniff exemption vs heavy rs-codeinsight cross-repo indexing). codesearch verb (lib/codeinsight.js searchCode(query,discipline,sessionId)) has no root param + index walks only cwd (computeIndexDigest), so cross-repo had no verb path. ccsniff fd56daa->b724dc5: added targetsOutsideCwd() exempting tree-search lines whose cd-target/abs-path-arg or Grep input.path is outside cwd. Validated live: gm search-discipline 8->4 (4 rs-plugkit sibling cd-greps now exempt). Unit-checked 5 cases all correct (sibling exempt, in-cwd source flagged, dist/config not mis-exempted).'
- id: self-search-discipline-reinforce
  body: 'AUDIT FINDING: recurring self-deviation - this session AND iter121 both had me as the top native-search offender within gm despite the SKILL.md class-rule existing. The within-gm greps this session (grep has-toc dist/paper, grep plugkitVersion gm.json) targeted build-output (dist/, gitignored) + config (gm.json) where codesearch (source-symbol index) is a poor fit - but a grep of source symbols should have been codesearch. The rule is sticky enough at PLAN-orient but slips for ad-hoc mid-EXECUTE lookups. memorize-fire a sharp reinforcement: mid-EXECUTE code/symbol lookups in the gm tree are codesearch dispatches, not Grep/bash-grep; config-value + build-output greps (gm.json, dist/) are acceptable bash (not source-symbol search) and should not be conflated. Distinguishes the real rule from the false-positive class so future fires neither violate nor over-correct.'
  status: completed
  witness: 'Reinforced via this audit''s correction + the detector now distinguishes the real rule from false positives. The 2 remaining true-positive gm violations (Grep ''session\s...'' + ''getOrCreateBrowserSession'' on gm-indexed gm-plugkit/wrapper) confirm the rule: in-cwd source-symbol lookup is a codesearch dispatch, which I did use correctly later this session (codesearch-2/3/4). memorize-fire dispatched separately to persist the sharpened rule (in-cwd source=codesearch; cross-repo + config-value/build-output grep=acceptable bash).'
