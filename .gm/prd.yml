- id: instruction-verb-in-plugkit
  subject: Add `instruction` verb that returns phase-appropriate prose
  status: pending
  description: New verb in rs-plugkit/src/orchestrator/. Reads current phase from .gm/turn-state.json (or input override). Returns JSON {phase, instruction_text, nextSkill, mutables_pending, prd_pending}. Agent dispatches instruction on every turn entry. The body of the response is the prose the agent should follow. Replaces the per-skill SKILL.md prose entirely.
  effort: medium
  category: feature
  route_family: execution
  load: 0.8
  blockedBy: [instruction-tables-in-plugkit]
  acceptance:
    - in/instruction/<N>.txt with empty body returns current-phase instruction
    - in/instruction/<N>.txt with body "phase=PLAN" returns PLAN instruction
    - response is JSON with phase, body, nextSkill fields

