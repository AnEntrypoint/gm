- id: fix-spool-command-blocks-callers
  title: gm-plugkit CLI `spool` command must daemonize watcher and return immediately once .status.json heartbeats fresh -- currently blocks/holds up the calling agent process instead of detaching into background
  witness: 'Investigated via codesearch: gm-plugkit/cli.js''s spool command IS designed to block until the daemon heartbeats fresh (waitForWatcherHeartbeat, 30s deadline, 300ms poll) -- this is the documented AGENTS.md contract (''Starting the spool is one atomic blocking call... returning exit 0 only when serving''), not an accidental hang; startSpoolDaemon/spawnWatcher spawn the actual watcher process detached, only the CLI''s own wait-for-ready loop blocks the calling shell, by design, so the caller can write to instruction/ immediately after the command returns. Witnessed a real occurrence of the 30s timeout firing during this session''s own boot (''Daemon start failed: watcher spawned (pid=41260) but .status.json heartbeat not fresh within 30s'') that resolved cleanly on a single retry -- consistent with the documented transient-boot-hiccup recovery pattern (retry @latest), not a structural blocking defect. This PRD row''s premise (the command should not block at all) contradicts the intended atomic-boot design; resolving as investigated -- behavior is correct-by-design, not a bug, though the 30s timeout is occasionally tight under load (a tuning question, not the reported blocking-forever issue) and out of scope for this session''s constraints-replacement/cleanup task.'
  status: completed
