  witness: 'bin/install.js applyClaudeSettings(): on corrupt settings.json, no longer overwrites with an empty-object-plus-two-keys fallback (which discarded all pre-existing valid settings) -- now backs up (unchanged from before) and returns early WITHOUT writing, leaving the user''s original (malformed) file untouched for manual repair. Regex/lenient-JSON salvage was considered and rejected: no json5 dependency exists in this package.json (deps: gm-plugkit, gmsniff, ccsniff only), and adding one for this narrow edge case would net-grow maintained surface for a corner case; a best-effort partial-parse also risks silently misrepresenting corrupted data as recovered, which is worse than a clear backup + explicit non-destructive skip. Witnessed via exec_js reproducing the exact function logic in an isolated tmpdir (exec_js-32.json): corrupt file backed up to .bak, original content byte-for-byte unchanged after the call, explicit error message surfaced. Caution: an earlier witness attempt (exec_js-31.json) required(''./bin/install.js'') directly, which triggered its require.main-guarded top-level install flow against this machine''s REAL ~/.claude/settings.json -- verified after the fact that the real file was already valid JSON so the non-corrupt path fired (idempotent rewrite of the same effortLevel/alwaysThinkingEnabled values, no data loss, no .bak created) -- but this was an unintended side effect of not isolating the require; the follow-up witness inlined the function logic instead of requiring the module. node --check passes on the whole file (exec_js-33.json).'
  status: completed
