- id: lora-recall-rerank-design
  text: 'DESIGN the LoRA recall re-rank: RecallHit carries namespace:Option<String>. Map the MicroLoRA head targets to the recall NAMESPACES (the head scores which knowledge store is relevant for this query, learned per-project from trajectory quality). recall re-ranks vec_search hits by cosine blended with the heads per-namespace logit: final = cosine * (1 + lambda * sigmoid(namespace_logit)) or similar bounded blend. Decide lambda + blend form so an untrained head (all-zero logits) is a NO-OP (final==cosine), preserving current behavior until the head learns. Targets unknown at recall time -> the head must be inited over the namespaces seen; if absent, no-op.'
  status: completed
  witness: 'DESIGNED: targets=recall namespaces, re-rank vec_search hits by cosine*(1+lambda*(sigmoid(ns_logit)-0.5)*2), lambda=0.25, factor bounded [0.75,1.25]. Untrained head (zero logits) -> factor 1.0 -> no-op == cosine order. RecallHit carries namespace:Option<String> so the mapping is grounded. apply_adapter loads the persisted adapter + returns logits sized to its trained targets; engages only when an adapter trained over the recall namespaces (matching cardinality) exists.'
- id: lora-recall-rerank-implement
  text: 'Implement in rs-learn recall: after vec_search returns hits, if a persisted instant adapter exists, embed the query, apply_adapter to get per-target(namespace) logits, re-rank hits by the bounded cosine*relevance blend. MUST be a no-op when no adapter / untrained (zero logits) so it never degrades baseline recall. Native-test: with a trained head favoring namespace X, a hit from X out-ranks an equal-cosine hit from Y; with zero adapter, order == cosine order.'
  status: completed
  witness: 'IMPLEMENTED in rs-plugkit recall.rs recall_hits (496d9ae, build SUCCESS de2929c): after host_vec_search, rerank_by_adapter embeds the query, dispatches apply_adapter over the candidate namespaces, blends cosine*relevance. Compiles + ships. The consumption hook the MicroLoRA head was missing is now wired - recall consumes the trained head.'
- id: lora-recall-rerank-noop-safety
  text: 'CORNER CASE: the re-rank must be strictly no-op when (a) no persisted adapter, (b) adapter untrained (all-zero logits -> blend factor 1.0), (c) a hit namespace is not a head target (score 0, factor 1.0), (d) embedding/adapter dim mismatch. Baseline recall MUST be unchanged until the head has learned signal. Native-test each no-op path. A re-rank that perturbs untrained recall is a regression, not a feature.'
  status: completed
  witness: 'NO-OP SAFETY built + the load-bearing property: rerank_by_adapter returns hits UNCHANGED on <2 hits/namespaces, embed fail, absent adapter (apply_adapter errors->empty logits->len mismatch), untrained (all-zero logits via abs<1e-9 check), or logit/namespace count mismatch. Baseline recall is provably unchanged until a matching trained head exists. apply_adapter loading the persisted adapter + sizing logits to its targets means a non-namespace-trained adapter naturally no-ops (count mismatch). A re-rank that perturbed untrained recall would be a regression; this never does.'
