- id: build-tool-config-injector
  subject: skill-bootstrap detects vite/astro/next/jest/webpack configs and injects .gm watch-ignore
  description: 'Add ensureBuildToolIgnores(cwd) called from bootstrapPlugkit. Detects config files in cwd top level only: vite.config.{js,ts,mjs,cjs}, astro.config.{js,ts,mjs}, next.config.{js,ts,mjs,cjs}, jest.config.{js,ts,mjs,cjs,json}, webpack.config.{js,ts,cjs,mjs}, rollup.config.{js,ts,mjs}, vitest.config.{js,ts,mjs}. For each detected config: append a single-line comment + ignore rule in a managed block delimited by ''/* >>> plugkit managed */'' and ''/* <<< plugkit managed */'' (or # markers for JSON). Block writes a JS snippet that the dev opts into manually (we cannot safely mutate config object literals) — instead we DROP a sibling file ''.gm/build-tool-ignores.md'' that lists ALL detected configs with copy-paste-ready snippets per tool, and we emit a warn event listing them. Rationale: programmatic injection into vite.config etc is too fragile; a checked-in advisory file is safer and the .gitignore line is the universal mechanism actually enforced. The .gitignore ''.gm/'' entry serves vite/astro/next/webpack/jest automatically because all of them respect node_modules ignore patterns AND .gitignore.'
  acceptance:
  - .gm/build-tool-ignores.md generated when any matching config is present
  - File lists each detected config with the canonical snippet for it
  - bootstrap event emitted naming detected tools
  - No mutation of user's config files
  effort: medium
