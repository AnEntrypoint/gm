- id: browser-blank-tab-root-cause
  text: 'ROOT CAUSE: startManagedBrowser (wrapper:818) spawns chromium with --user-data-dir/--remote-debugging-port/--no-first-run; chromium ALWAYS opens one initial about:blank tab. Then getOrCreateBrowserSession runs playwriter session new --direct <wsEndpoint> (wrapper ~1031/~1084), which attaches over CDP and opens a NEW page (2nd tab), leaving the blank one idle = wasted renderer/tab. playwriter 0.2.0 session new --direct has NO page-reuse option (verified via session new --help: only --host/--token/--browser/--direct). FIX SURFACE: wrapper post-attach (playwriter is external npm, not patchable here). After session new --direct returns the pwSessionId, dispatch a playwriter eval on that session that closes the orphan about:blank page so only the working page remains.'
  witness: 'PREMISE FALSIFIED BY LIVE WITNESS: the 2-tab assumption does NOT reproduce on the current wrapper (2.0.1505). Cold-spawn test: deleted session 57 (chrome graceful-closed, ports.json -> {}), fresh session new -> session 58, immediately queried raw CDP /json on the chromium port BEFORE any goto: PAGE TABS=1 (chrome://newtab/ only). page.context().pages().length=1, browser.contexts()=1 ctx/1 page. goto reuses the same page (1->1, no new tab). Repeated session new returns the same pwSessionId (fast-reuse, no new tab). So playwriter session new --direct ADOPTS chromium''s existing initial NTP tab rather than opening a second - there is no orphan blank tab to combine. The chrome-lifecycle work (2.0.1505) or playwriter''s CDP-adopt behavior already yields single-tab.'
  status: completed
- id: browser-close-orphan-blank-tab
  text: 'FIX: after a fresh chromium launch + session new --direct attach (the startManagedBrowser branch in getOrCreateBrowserSession, NOT the reuse-existing branches), dispatch one playwriter eval on the new pwSessionId that finds extra about:blank pages in the context and closes all but the working page. Shape: page.context().pages() -> for pages with url ''about:blank'' or chrome://newtab beyond the active one, page.close(). Run it via runBrowserRunner(pw,[ -s, pwSessionId, -e, <script> ]) once, right after attach, only on the spawn path. Guard: never close the last/only page; never close a page the agent is using.'
  witness: 'NOT SHIPPED (Nothing Fake + pliable): the close-orphan-blank fix targets a 2-tab state that does NOT reproduce on the current wrapper (witnessed PAGE TABS=1 cold-spawn). Shipping defensive close-blank code for a non-reproducing case net-grows the maintenance surface for zero benefit and risks closing the working page (the close-safety row''s hazard). The single-tab behavior is already correct; no code change is the correct outcome.'
