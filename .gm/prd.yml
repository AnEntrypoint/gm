- id: branch-status-stale-ref
  subject: 'NOTICED + ROOT-CAUSED (real bug): branch_status reports ahead:N against a STALE local origin/main tracking ref. Witnessed this fire: git_finalize pushed 737d3b40 (ok:true), origin actually advanced (git fetch showed 55d54ae0..737d3b40 main->origin/main, so the push LANDED), but branch_status kept returning ahead:1 because git_push/git_finalize do not update the local remote-tracking ref and branch_status computes rev-list origin/main...HEAD against the stale ref. Only after a manual git fetch did branch_status read ahead:0. IMPACT: the COMPLETE gate uses branch_status remote-pushed witness (ahead==0); a stale ahead:N is a FALSE POSITIVE that wedges the chain at VERIFY even though the work is pushed - this is the recurring ahead:1 I saw iter116-118 and mis-attributed to transient churn. FIX: branch_status should git fetch (or git ls-remote origin <branch>) before computing ahead/behind, so it compares against the true remote not a stale local ref. In rs-plugkit wasm_dispatch.rs branch_status fn (~line 1082).'
  status: completed
  witness: 'ROOT-CAUSED + FIXED at BOTH sites. (1) wasm_dispatch.rs branch_status: added git fetch <remote> <branch> before the rev-list (gated by {no_fetch} opt, tolerates offline). (2) orchestrator/transitions.rs:68 COMPLETE-gate remote-pushed witness: same fetch-before-rev-list - THIS was the recurring ahead:1 COMPLETE rejection across iter116-118, mis-attributed to transient churn; it was a stale local origin/main ref the whole time. Witnessed: git fetch showed 55d54ae0..737d3b40 (push HAD landed), branch_status post-fetch ahead:0. Fix ships next wasm; this session manually fetched so the running gate now reads ahead:0.'
