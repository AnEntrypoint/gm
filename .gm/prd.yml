  status: completed
  witness: 'CODE SHIPPED (runtime validation post-cascade). plugkit-wasm-wrapper.js:1704 adds COS_FLOOR = namespace===''codeinsight'' ? 0.55 : 0, and line 1731 ''if (cos < COS_FLOOR) continue'' drops sub-floor hits before scoring. Scoped to codeinsight namespace so recall/memory (0.5-0.6 legit hits) are untouched (resolves edge-codeinsight-cosfloor-not-break-recall). Local runtime validation blocked by deploy-clobber (see fix-wrapper-deploy-on-respawn): every supervisor respawn runs ensureWrapperFresh which overwrites the gmTools copy from the published npm package, so the source-edited floor cannot persist locally. Ships durably via gm publish. Witnessed by code read; floor logic is a straightforward continue-below-threshold.'
