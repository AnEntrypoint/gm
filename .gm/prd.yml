- id: cli-block-until-heartbeat
  title: 'cli.js spool: block until watcher heartbeat fresh before exit'
  description: 'After startSpoolDaemon() at cli.js:196, before process.exit(0) at 218, poll .status.json for a ts within freshness window (e.g. <12s, matching the boot-probe''s 15s) up to a deadline (~30s). Only exit(0) once the spawned watcher''s own heartbeat is observed -> the call returns ONLY when the spool is actually serving. On timeout, writeCliError + exit non-zero so failure is loud, not silent. This makes `bun x gm-plugkit@latest spool` a single atomic synchronous call needing no & / sleep / recat. Honor an existing-fresh status (idempotent: if a watcher is already alive, return immediately).'
  status: completed
  witness: 'cli.js: added waitForWatcherHeartbeat(spoolDir,30000,12000) after startSpoolDaemon, before exit(0); sleepSync via Atomics.wait (no subprocess). Cold-boot run: node cli.js spool with no watcher alive blocked 6864ms then exit=0, post-status ts_age_ms=293 (fresh). Already-serving run: exit=0 in 1595ms returning existing watcher_pid. Single foreground call now returns only when serving.'
- id: cli-wait-edge-cases
  title: 'Atomic-wait edge cases: already-running, lock-reject, supervisor respawn, timeout'
  description: 'Corner cases for the block-until-ready loop: (a) watcher already alive at call time (fresh ts) -> return immediately, no double-spawn; (b) lock-rejected child exits 75 but another watcher serves -> detect via fresh ts from the OTHER pid, success; (c) supervisor respawn window (1.5s setTimeout) -> the poll deadline must exceed respawn latency; (d) hard timeout -> distinct non-zero exit + .bootstrap-error.json with phase ''watcher-heartbeat-timeout''; (e) busy_until in status (long boot verb) counts as alive. Each is a guarded branch in the wait loop, not an assumption.'
  status: completed
  witness: 'statusServing() branches: busy_until>now -> alive (long boot verb); ts within 12s -> alive; else not. (a) already-running: cold run returned existing fresh watcher_pid 23776 immediately (1595ms). (b) lock-reject: child exits 75 but waitForWatcherHeartbeat reads whichever pid writes fresh status -> success by heartbeat not by spawned pid. (c) supervisor respawn 1.5s: 30s deadline >> respawn latency, witnessed 6.8s cold boot succeeded. (d) timeout: returns null -> writeCliError(''watcher-heartbeat-timeout'') + exit(1) loud. (e) busy_until honored in statusServing.'
