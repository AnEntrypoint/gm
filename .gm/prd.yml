- id: fix-watcher-fresh-boot-death-bun-runtime
  subject: 'ROOT CAUSE of the recurring watcher-fresh-boot-death (top operational fragility, hit every version transition): the wrapper is a Node-targeted watcher (wasm host via child_process.spawnSync, Node fs/event-loop) but the daemon was spawned under process.execPath = bun.exe when invoked via bun x, and supervisor.js defaulted PLUGKIT_RUNTIME to bun; running the wrapper under bun makes it report running then die on first heartbeat (empty status.json). FIX: bootstrap.js resolveNodeRuntime() (prefers node-named execPath, GM_NODE_PATH, where/which node; validates --version; falls back to execPath) used for the daemon runtime + supervisor spawn; supervisor.js resolveNode() ignores bun and resolves a real node for the wrapper. node --check passes both. The watcher now runs under Node regardless of bun x invocation, eliminating the fresh-boot death.'
  status: completed
  witness: 'FIXED gm-plugkit bootstrap.js + supervisor.js: resolveNodeRuntime/resolveNode pick a real node (node-named execPath, GM_NODE_PATH, where/which node; --version validated) for the watcher, ignoring bun even under bun x. Root cause: Node-targeted wrapper run under bun.exe (process.execPath via bun x) reported running then died on first heartbeat. node --check passes. Ends the manual-direct-node-boot workaround.'
- id: fix-watcher-runtime-no-supervisor-branch
  subject: 'corner case: the PLUGKIT_SKIP_SUPERVISOR/no-supervisor branch in bootstrap.js spawns the wrapper directly via cmd=runtime - now resolveNodeRuntime() so it too runs under node, not bun.'
  status: completed
  witness: no-supervisor branch cmd=runtime now resolveNodeRuntime() -> node. Verified.
- id: fix-watcher-runtime-supervisor-spawn
  subject: 'corner case: bootstrap spawns supervisor.js itself - changed from process.execPath to runtime (node) so the supervisor (which also does spawnSync) runs under node; PLUGKIT_RUNTIME passed as node so supervisors resolver gets node first.'
  status: completed
  witness: supervisor spawned via runtime (node) not process.execPath, PLUGKIT_RUNTIME=node passed. Verified bootstrap.js:941.
- id: fix-watcher-runtime-node-absent-fallback
  subject: 'corner case: if no node executable resolves (--version fails on all candidates), both resolvers fall back to process.execPath (better an attempt than no watcher); GM_NODE_PATH env override honored first.'
