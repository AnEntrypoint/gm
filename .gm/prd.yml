- id: prune-silent-noop-rootcause
  text: 'DEVIATION (silent prune no-op, user top-priority bad-memory-pruning): rs-plugkit wasm_dispatch.rs:452 memorize_prune only adds a key to deleted + emits memory.pruned when host_kv_delete rc!=0 (key existed in namespace). On rc==0 (key/namespace mismatch) it SILENTLY skips - returns {ok:true, deleted:[]}, looking like success but pruning nothing. tv8 agent hit this. FIX: track not_found keys, include them in the response, and emit a memory.prune-miss event so the agent (and gmsniff) see the no-op instead of being misled.'
  status: completed
  witness: 'FIXED rs-plugkit (ce9ed96->53544d0): the silent rc==0 skip now surfaces as not_found + memory.prune-miss. Was the tv8 prune issue: deleted:[] looked like success but pruned nothing (wrong namespace / key mismatch). Ships next wasm.'
- id: fix-memorize-prune-not-found
  text: 'mod memorize_prune explicit-key branch: collect not_found = keys where rc==0; add not_found to the ok() response json; emit memory.prune-miss event per not-found key with {key, namespace} so the silent skip becomes observable.'
  status: completed
  witness: 'DONE: explicit-key branch collects not_found, adds it + a fix-note to the response, emits memory.prune-miss per skip. json! Object index-assign valid; comment stripped per no-comments rule (note string is agent-facing data).'
- id: validate-prune-fix-ships
