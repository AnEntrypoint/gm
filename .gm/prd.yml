  description: 'rs-plugkit/src/wasm_dispatch.rs:318-322 kv_put accepts agent-supplied namespace with no validation. Agents can write to inbox, outbox, disciplines, or any internal KV namespace. Fix: maintain explicit allowlist of writable namespaces (e.g. ''agent-kv''), return err for internal namespaces.'
