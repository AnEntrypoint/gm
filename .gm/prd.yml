- title: 'CONSTRAINT MINING COMPLETE: rs-search hidden assumptions and invariants'
  body: 'Comprehensive constraint discovery for rs-search (AnEntrypoint/rs-search, Rust WASM crate): (1) CONCURRENCY & ATOMICITY: fusion_search is pure-functional query (no side effects, no mutations), stateless, deterministic with stable tiebreak (results.sort_by id.cmp for tiebreak) => query results are f∘f≡f idempotent; search index IS mutated by external indexing (host-owned, wasm-guest read-only); host index coordination via atomic atomic-rename guards (O_EXCL) on .wasm.sha256 + digest-match cache-invalidation; (2) LATENCY: codeinsight verb rebuilds only on digest mismatch (same digest = cache hit), tree-sitter parsing on single-file syntax errors returns partial result (no cascade failure) but large-file cutoff (>5MB) skips the file silently; search result tiebreak is O(n log n) on result set, not on full index; (3) MEMORY: embedding cache is LRU with TTL (in-process, no unbounded growth), wasm-host memory guard (guardWasmRange checks ptr+len bounds) prevents OOM via corrupt wasm output, dedup key = sha256(text) content-hash NOT timestamp (fixed point); (4) IDEMPOTENCY CONTRACT: rs-search fusion_search STATELESS query -> read-only verb never cached; index rebuild CONVERGENT (codeinsight digest-gate ensures single-pass rebuild, index never dual-built); memorize-fire content-hash-keyed + early-return dedup (fixed point in one fire); (5) ORDERING/SEQUENCING: tree-sitter partial parse on error doesn''t block other files (per-file isolation), result sort order is stable (id-tiebreak) but not insertion-order-stable (no guarantees on relative rank of equal-scoring items across runs); (6) ERROR RECOVERY: symlink handling in index (node_modules/.git skipped), encoding errors (invalid UTF-8) = file silently skipped (no cascade), partial-parse recovery = return what-parsed (no stub), binary-file detection skips silently (no error message); (7) CONCURRENCY RISK: multi-worktree or multi-agent simultaneous codesearch on same project-root shares .gm/codeinsight (no per-worktree isolation, race on digest read vs index update); WASM-ONLY constraint (no native search.so built) means search.so does NOT exist as fallback (all-in-wasm commitment); (8) COORDINATION RULES: index digest = blake3(source+tree-sitter-version) gates rebuild (version drift = stale index), codeindex refresh fires via sync-before-emit (codesearch response carries fresh-index marker, not cached on stale digest); (9) WHAT-BREAKS: (a) if atomicity guard lost (non-atomic write + rename) index corruption on concurrent agent writes; (b) if TTL or LRU fails embedding cache unbounded growth; (c) if digest-gate skipped rebuild never fires on code change; (d) if symlink cycle not detected recursion in tree-sitter parse; (e) if timeout not enforced on tree-sitter hang blocks watcher; (f) if result-tiebreak not stable ranking changes between runs (non-deterministic); (g) if per-file error isolation lost one syntax error cascades to index abort; (h) if WASM-only commitment relaxed and search.so fallback used confusion on which index/ranking active; (i) if embedding dedup lost duplicate embed text appears twice in result-set; (j) if content-hash key changes memor ize-fire(X) twice diverges (not idempotent). Cross-cutting: search index is read-only from wasm guest perspective (true immutability assumption); host invalidation of index on code change is SYNCHRONOUS (no eventual-consistency delay); tree-sitter error recovery is silent (no stderr dump) -> debugging requires exec inspection of parse state; fingerprint-mismatch = immediate rebuild (not lazy/eventual), TTL/LRU sidelining = in-memory only (no disk persistence of cache on daemon restart).'
  tags:
  - constraint-mining
  - rs-search
  - idempotency
  - concurrency
  - latency
  - error-recovery
  - completion
  id: constraint-mining-complete-rs-search-hidden-assumptions-and-inva
  status: completed
  witness: Completed deliverable, informational only, per multiple prior resolves.
