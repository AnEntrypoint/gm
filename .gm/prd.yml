- id: watcher-reinstantiate-after-update
  subject: Watcher must re-instantiate wasm after bootstrap, not just trust resolveVersion file lookup
  category: feature
  description: 'Surfaced during PRD-44 update witness: bootstrap to v0.1.416 succeeded, ~/.claude/gm-tools/plugkit.version updated to 0.1.416, .status.json reports 0.1.416 (because resolveVersion reads the file), but a health dispatch returned version 0.1.411 — the running wasm instance is stale, only the on-disk version file refreshed. The current LinkError-triggered self-heal in the wrapper does not fire because the instance imports are still valid; the wasm just disagrees with the file. Fix: when checkForUpdate detects drift AND a new wasm file lands on disk (mtime check), the watcher should kill itself with a sentinel exit code so the next-boot spawn picks up the fresh binary. OR: detect the version mismatch between resolveVersion-from-file and a fresh plugkit_version() call from the instance, and trigger a re-instantiation by exiting and respawning. Simplest path: exit(0) with a stderr message; the daemon supervisor / bootstrap re-spawn handles relaunch.'
  acceptance:
  - After plugkit.version file updates AND the file mtime differs from the time we instantiated, the watcher exits cleanly so a fresh process loads the new wasm
  - 'Witness: health verb returns same version as .status.json'
  - No more split-brain between file-version and instance-version
  effort: medium
  route_family: execution
  status: completed
