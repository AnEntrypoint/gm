- id: bun-eval-throw-wrapper
  subject: rs-exec runtime.rs wraps nodejs eval body in try/catch with explicit stderr on synchronous throws (bun -e swallows ENOENT etc.)
  status: pending
  description: WITNESSED — bun 1.3.8 silently swallows fs.readFileSync ENOENT throws under "bun -e": exits 0, prints nothing. Other throws ("throw 'B'") DO print. This is a bun upstream bug. Mitigate in rs-exec runtime.rs:228 by wrapping the eval body in a try/catch that explicitly prints to process.stderr and sets process.exitCode=1. Form: ["bun","-e", "try{" + code + "}catch(e){console.error(e&&e.stack||e);process.exitCode=1}"]. Same wrap for typescript runtime (same path). Skip wrap if user already includes top-level try (heuristic: starts with "try" or contains "process.on('uncaughtException'") — keep it simple: always wrap, double-wrap is harmless.
  effort: small
  category: bug
  route_family: execution
  load: 0.8
  failure_modes: [silent-throw-swallow, runtime-divergence]
  route_fit: dominant
  authorization: witnessed
  blocking: []
  blockedBy: []
  acceptance:
    - runtime.rs nodejs/typescript branch wraps user code in try/catch with console.error
    - re-witness: exec:nodejs require('fs').readFileSync('/nope') surfaces ENOENT and exits 1
  edge_cases:
    - user code with top-level await: wrapping with try/catch on the outer arrow shouldn't break — bun -e accepts async iife. Test with a Promise.reject case.
    - already-thrown printable errors (like "throw 'B'"): both bun's native print and our wrapper would print — acceptable noise.

