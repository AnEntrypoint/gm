- id: download-absdeadline-kills-progress
  text: 'DEVIATION (distributability bug): gm-plugkit/bootstrap.js httpGetBuffer (L248-259) sets a hard absTimer = totalDeadlineMs (timeoutMs*2; 120s for the gh-release wasm fetch) that destroys the download regardless of progress. The wasm is ~149MB; on a normal/slow link 120s is not enough (witnessed bootstrap-error: abs-deadline 120000ms ... after 7634259 bytes - died mid-download with bytes actively arriving). Result: 0.1.605 upgrade silently failed across 2 boot attempts, watcher stuck on 0.1.604 with update_available perpetually flagging 0.1.605. The req idle-timeout (idleTimeoutMs, socket inactivity) already catches genuine stalls. FIX: reset absTimer on each data chunk so a download making progress is never killed; only true inactivity (idle-timeout) aborts.'
  status: completed
  witness: 'FIXED gm-plugkit/bootstrap.js httpGetBuffer: hard absTimer (120s total) killed the 149MB wasm download mid-progress, blocking 0.1.605 upgrade (witnessed bootstrap-error after 7.6MB). Now progress-aware. Root cause of the stuck-on-0.1.604 + perpetual update_available.'
- id: fix-httpgetbuffer-progress
  text: 'gm-plugkit/bootstrap.js httpGetBuffer: in res.on(data), reset the absTimer (clearTimeout + re-arm) so the abs-deadline becomes a since-last-progress backstop, not a total cap. Keep idle-timeout as the stall catcher.'
  status: completed
  witness: 'DONE: armAbsTimer() clears+re-arms absTimer, called at start + on every data chunk -> since-progress deadline, not total cap. clearTimeout paths intact (absTimer now let). node -c OK.'
