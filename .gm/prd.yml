- id: self-stale-respawn-no-heartbeat-wait
  subject: 'ROOT CAUSE of wrapper-only-fix-no-autodeploy refined: probeGmPlugkitSelfStale IS wired (setTimeout 5s + setInterval 300s, wrapper:2339-2340) and DOES compare installed gm-plugkit.version (2.0.1499) vs npm latest (2.0.1502) and spawns bun x gm-plugkit@<latest> spool. BUT the self-stale respawn (wrapper:2294-2307) exits the OLD watcher blindly via setTimeout(process.exit,2000) WITHOUT waiting for the replacement''s fresh heartbeat - UNLIKE the version-drift path (wrapper:2386-2408) which polls STATUS_PATH for a fresh-heartbeat-from-different-pid up to 90s before exiting. So when the bun x download is slow (the common case for a real version change), the old watcher exits in 2s, the supervisor restarts (often re-launching the same stale version before the new one finishes), and the update never lands - the wrapper sits stale (witnessed: installed 2.0.1499, npm 2.0.1502, uptime 10.9M). FIX: make the self-stale respawn mirror the version-drift wait-for-heartbeat pattern (poll STATUS_PATH for fresh ts + different pid, 90s deadline, only then exit; on spawn-fail or timeout fall back to the 2s exit). Witness: self-stale respawn waits for replacement heartbeat; installed gm-plugkit.version advances to npm latest after a probe cycle.'
  status: completed
  witness: 'FIXED wrapper:2294-2333: the gm-plugkit self-stale respawn now polls STATUS_PATH_FOR_TEARDOWN for a fresh-heartbeat (<15s) from a different pid, up to a 90s deadline, before exiting - mirroring the version-drift path (2386-2408) - instead of the blind setTimeout(exit,2000). On timeout it falls back to exit. node --check passes. This closes the unreliable-auto-update gap: a slow gm-plugkit download no longer lets the supervisor relaunch the stale version before the new one lands. Ships via gm-plugkit npm publish.'
