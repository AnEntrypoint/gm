  witness: 'rs-plugkit ec6a751: gates.rs now reads PRIOR .gm/last-dispatch-ts before overwriting, and long_gap_should_fire(last_instruction,prev_dispatch,now,300k) requires BOTH idle-since-instruction AND idle-since-any-dispatch. Active back-to-back work verbs keep prev_dispatch fresh so the gate stays quiet; genuine idle (prev==0 or >300s) still fires. Pure helper + 4 unit tests. Pushed; CI cascade builds the wasm.'
