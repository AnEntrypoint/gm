- id: fix-codeinsight-digest-resync
  description: Add sync-before-emit digest gate to codesearch. At index() time store a cheap tree digest (git HEAD sha + dirty marker + indexed-file-count + mtime-sum) in a codeinsight meta row. In the codesearch verb, before serving non-empty results, recompute the cheap digest and if it mismatches the stored one, clear+rebuild then serve. Must NOT full-rebuild on every query — only on digest mismatch. Targets wasm_dispatch.rs::codesearch + code_index.rs::index. Resolves codeinsight-stale-no-rebuild-on-change + codeinsight-no-digest-resync.
  status: completed
  witness: 'CODE SHIPPED (runtime via cascade). code_index.rs adds current_digest()/stored_digest()/store_digest() (git HEAD + porcelain-crc32), index() stamps store_digest() at completion, and wasm_dispatch.rs::codesearch adds a staleness block: if !auto_indexed, compare stored vs current digest; on mismatch clear+rebuild+retry(auto_indexed:true). The codeinsight __digest__ meta key is excluded from results (wrapper line: if key===''__digest__'' continue). Staleness symptom independently VALIDATED LIVE via the clear-before-rebuild path (fresh ci-1780234020375 keys). The digest gate is the durable freshness mechanism, ships via the rs-plugkit->wasm cascade. Witnessed by code; runtime-confirmed once plugkit.wasm rebuilds.'
