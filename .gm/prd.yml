- id: browser-session-profile-not-isolated
  body: 'USER-FLAGGED LIVE: concurrent agents notice/interact-with/close each others browser sessions; separation important. ROOT CAUSE: getOrCreateBrowserSession (plugkit-wasm-wrapper.js:977) keys ports/sessions maps by claudeSessionId (good) BUT acquireProfileDir(cwd) (line 680/1036) keys the chromium profile ONLY by cwd -> all concurrent sessions in the same cwd contend for .gm/browser-profile; the isProfileLocked fallback is browser-profile-<watcher.pid> which is NON-UNIQUE across sessions sharing one watcher. wantProfile (line 985) is the shared path too, so the collision/reclaim (1005-1032) closes a peer sessions live browser (collision:pid-dead/cdp-dead). FIX: key the profile dir by claudeSessionId - acquireProfileDir(cwd, sid) returns .gm/browser-profile-<sid>; wantProfile uses the same per-sid path; cleanDeadProfileFragments + hygiene regex match the -<sid> form. Per-session chromium = no crosstalk.'
  status: completed
  witness: 'FIXED plugkit-wasm-wrapper.js: acquireProfileDir(cwd, claudeSessionId) now returns per-session .gm/browser-profile-<sid> (sessionProfileDir + sessionProfileSlug sanitizer); wantProfile in getOrCreateBrowserSession uses sessionProfileDir(cwd, claudeSessionId); call site passes claudeSessionId. Each concurrent agent session gets its own chromium profile -> no shared-primary contention, no peer-browser reclaim. ports/sessions maps were already per-sid-keyed.'
